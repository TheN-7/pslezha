<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PS - Dega Lezhe - Lista Zgjedhore</title>
    <meta name="description" content="Platforma e Menaxhimit të Strukturës Politike të Partisë Socialiste - Dega Lezhe">
    <meta name="author" content="PS Dega Lezhe">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div class="min-h-screen">
        <!-- Header -->
        <header class="bg-white border-b">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between items-center h-16">
                    <div class="flex items-center">
                        <h1 class="text-xl font-bold">PS - Dega Lezhe</h1>
                    </div>
                    <nav class="flex space-x-4">
                        <a href="dashboard.html" class="text-gray-700 hover:text-gray-900 px-3 py-2 rounded-md text-sm font-medium">Dashboard</a>
                        <a href="structure.html" class="text-gray-700 hover:text-gray-900 px-3 py-2 rounded-md text-sm font-medium">Struktura</a>
                        <a href="electoral-list.html" class="text-blue-600 px-3 py-2 rounded-md text-sm font-medium">Lista Zgjedhore</a>
                        <a href="families.html" class="text-gray-700 hover:text-gray-900 px-3 py-2 rounded-md text-sm font-medium">Familjet</a>
                        <a href="emigrants.html" class="text-gray-700 hover:text-gray-900 px-3 py-2 rounded-md text-sm font-medium">Emigrantët</a>
                        <a href="patronage-workers.html" class="text-gray-700 hover:text-gray-900 px-3 py-2 rounded-md text-sm font-medium">Punëtorë Patronazhi</a>
                    </nav>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div class="bg-white rounded-lg shadow">
                <div class="px-6 py-4 border-b">
                    <h2 class="text-lg font-semibold">Lista Zgjedhore</h2>
                    <p class="text-sm text-gray-500 mt-1">Kërko votuesit në bazë të emrit ose numrit personal</p>
                </div>

                <!-- Search Section -->
                <div class="px-6 py-4 border-b">
                    <div class="max-w-md">
                        <input 
                            type="text" 
                            placeholder="Kërko votues..."
                            class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        >
                    </div>
                </div>

                <!-- Results Table -->
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead>
                            <tr class="border-b bg-gray-50">
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">#</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Emri</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Mbiemri</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Atësia</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Nënësia</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Datëlindja</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">NJU</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Mosha</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Preferencë</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Referues</th>
                                <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Veprime</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr class="border-b">
                                <td colspan="11" class="px-6 py-8 text-center text-gray-500">
                                    Shkruani të paktën 2 karaktere për të filluar kërkimin
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Results Count -->
                <div class="px-6 py-4 border-t bg-gray-50">
                    <p class="text-sm text-gray-600"></p>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
